<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AngoStart</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="stylesheet" href="../styles/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- scritp  -->
  <script src="../scripts/dashboard.js" defer></script>
</head>
<body className="dashboard-page">
  
  <!-- Sidebar -->
  <aside id="sidebar" className="sidebar">
    <div className="sidebar-header">
      <img src="..//logo.png" alt="AngoStart" className="sidebar-logo">
      <button id="sidebarClose" className="sidebar-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <nav className="sidebar-nav" id="sidebarNav">
      <!-- A navegação será preenchida automaticamente por JavaScript com base na função do usuário. -->
    </nav>

    <div className="sidebar-footer">
      <div className="user-profile">
        <div className="user-avatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div className="user-info">
          <p className="user-name" id="userName">Usuário</p>
          <p className="user-role" id="userRole">Função</p>
        </div>
      </div>
      <button className="btn-logout" id="logoutBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Mobile Overlay -->
  <div id="sidebarOverlay" className="sidebar-overlay"></div>

  <!-- Main Content -->
  <main className="main-content">
    <!-- Top Bar -->
    <header className="top-bar">
      <button id="sidebarToggle" className="sidebar-toggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div className="top-bar-title">
        <h1 id="pageTitle">Dashboard</h1>
      </div>

      <div className="top-bar-actions">
        <button className="icon-btn" title="Notificações">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span className="notification-badge">0</span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <div className="page-content" id="pageContent">
      <!-- Content will be loaded here -->
    </div>
  </main>

</body>
</html>
