<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - AngoStart</title>
  <link rel="stylesheet" href="../styles/styles.css">
  <link rel="stylesheet" href="../styles/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- script  -->
  <script src="../scripts/register.js" defer></script>
</head>
<body class="auth-page">
  
  <div class="auth-container">
    <div class="auth-content auth-content-wide">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <img src="../img/logo.png" alt="AngoStart">
        </div>
        <h1 class="auth-title">Criar sua conta</h1>
        <p class="auth-subtitle">Comece sua jornada empreendedora hoje</p>
      </div>

      <!-- Card -->
      <div class="auth-card">
        <!-- Step 1: Choose Role -->
        <div id="stepRole" class="step-content">
          <div class="card-header">
            <h2>Escolha seu tipo de conta</h2>
            <p class="card-description">Selecione como você deseja usar a AngoStart</p>
          </div>

          <div class="card-content">
            <div class="role-options">
              <!-- Empreendedor -->
              <label class="role-card" for="roleEmpreendedor">
                <input type="radio" name="role" id="roleEmpreendedor" value="empreendedor" checked>
                <div class="role-content">
                  <div class="role-header">
                    <svg class="role-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                      <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                    <span class="role-title">Empreendedor</span>
                  </div>
                  <p class="role-description">Quero validar e desenvolver minha ideia</p>
                </div>
              </label>

              <!-- Investidor -->
              <label class="role-card" for="roleInvestidor">
                <input type="radio" name="role" id="roleInvestidor" value="investidor">
                <div class="role-content">
                  <div class="role-header">
                    <svg class="role-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <span class="role-title">Investidor</span>
                  </div>
                  <p class="role-description">Quero investir em startups promissoras</p>
                </div>
              </label>

              <!-- Mentor -->
              <label class="role-card" for="roleMentor">
                <input type="radio" name="role" id="roleMentor" value="mentor">
                <div class="role-content">
                  <div class="role-header">
                    <svg class="role-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                      <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                    <span class="role-title">Mentor</span>
                  </div>
                  <p class="role-description">Quero compartilhar conhecimento e experiência</p>
                </div>
              </label>
            </div>

            <button type="button" class="btn btn-primary btn-block" id="continueBtn">
              Continuar
            </button>

            <div class="auth-footer-link">
              <p>
                Já tem uma conta? 
                <a href="login.html" class="link-primary">Entrar</a>
              </p>
            </div>
          </div>
        </div>

        <!-- Step 2: User Details -->
        <div id="stepDetails" class="step-content hidden">
          <div class="card-header">
            <h2>Complete seu cadastro</h2>
            <p class="card-description">Preencha seus dados para criar a conta</p>
          </div>

          <div class="card-content">
            <form id="registerForm" class="auth-form">
              <!-- Error Alert -->
              <div id="errorAlert" class="alert alert-error hidden">
                <svg class="alert-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="8" x2="12" y2="12"/>
                  <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorMessage"></span>
              </div>

              <!-- Name Field -->
              <div class="form-group">
                <label for="name" class="form-label">Nome completo</label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                  <input 
                    type="text" 
                    id="name" 
                    class="form-input" 
                    placeholder="Seu nome"
                    required
                  >
                </div>
              </div>

              <!-- Email Field -->
              <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                  </svg>
                  <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="seu@email.com"
                    required
                  >
                </div>
              </div>

              <!-- Password Field -->
              <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="Mínimo 6 caracteres"
                    required
                  >
                </div>
              </div>

              <!-- Confirm Password Field -->
              <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirmar senha</label>
                <div class="input-wrapper">
                  <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  <input 
                    type="password" 
                    id="confirmPassword" 
                    class="form-input" 
                    placeholder="Digite a senha novamente"
                    required
                  >
                </div>
              </div>

              <!-- Buttons -->
              <div class="form-button-group">
                <button type="button" class="btn btn-outline" id="backBtn">
                  Voltar
                </button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                  Criar conta
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
